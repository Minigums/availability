<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chuan — Availability</title>
<style>

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --border: #2a2a2a;
    --text: #e0e0e0;
    --muted: #6a6a6a;
    --accent: #ffffff;
    --available: #00ff88;
    --busy: #ff4444;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 20px;
  }
  .container { max-width: 720px; width: 100%; }
  h1 { font-size: 1.5rem; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 4px; }
  .subtitle { color: var(--muted); font-size: 0.8rem; margin-bottom: 40px; }
  .legend { display: flex; gap: 20px; margin-bottom: 32px; font-size: 0.7rem; color: var(--muted); }
  .legend span { display: flex; align-items: center; gap: 6px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot.available { background: var(--available); }
  .dot.busy { background: var(--busy); }
  .grid {
    display: grid;
    grid-template-columns: 50px repeat(7, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .cell {
    background: var(--surface);
    padding: 10px 4px;
    text-align: center;
    font-size: 0.65rem;
    transition: background 0.15s;
    min-height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .cell.header {
    background: var(--bg);
    color: var(--muted);
    font-weight: 600;
    font-size: 0.6rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 10px 4px;
    flex-direction: column;
    gap: 2px;
  }
  .cell.header .date { font-weight: 400; font-size: 0.5rem; opacity: 0.7; }
  .cell.time-label {
    background: var(--bg);
    color: var(--muted);
    font-size: 0.6rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .cell.available { background: rgba(0, 255, 136, 0.08); }
  .cell.busy { background: rgba(255, 68, 68, 0.15); }
  .cell.empty { background: var(--surface); }
  .timezone-note { margin-top: 24px; font-size: 0.7rem; color: var(--muted); text-align: center; }
  .contact { margin-top: 32px; text-align: center; font-size: 0.75rem; color: var(--muted); }
  .updated { margin-top: 8px; font-size: 0.65rem; color: var(--muted); text-align: center; }
  @media (max-width: 600px) {
    .grid { grid-template-columns: 40px repeat(7, 1fr); }
    .cell { padding: 8px 2px; font-size: 0.55rem; min-height: 30px; }
    body { padding: 30px 10px; }
  }
</style>
