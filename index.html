<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Availability</title>
<style>

  :root{--bg:#0d0d0d;--surface:#161616;--border:#2a2a2a;--text:#e0e0e0;--muted:#6a6a6a;--accent:#ffffff;--available:#ffffff;--busy:#ff4444}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'SF Mono','Fira Code','JetBrains Mono',monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 20px}
  .container{max-width:820px;width:100%}
  h1{font-size:1.5rem;font-weight:600;letter-spacing:-.02em;margin-bottom:4px;color:#fff}
  .nav{display:flex;align-items:center;gap:12px;margin-bottom:24px;flex-wrap:wrap}
  .nav button{background:var(--surface);color:var(--text);border:1px solid var(--border);padding:6px 14px;border-radius:4px;font-family:inherit;font-size:.7rem;cursor:pointer;transition:all .15s}
  .nav button:hover{background:var(--border);border-color:#555}
  .nav button.active{background:#fff;color:#000;border-color:#fff;font-weight:600}
  .nav .week-label{color:var(--muted);font-size:.75rem}
  .legend{display:flex;gap:20px;margin-bottom:20px;font-size:.7rem;color:var(--muted)}
  .legend span{display:flex;align-items:center;gap:6px}
  .dot{width:8px;height:8px;border-radius:50%}
  .dot.available{background:#fff;box-shadow:0 0 6px rgba(255,255,255,.4)}
  .dot.busy{background:var(--busy)}
  .scroller{overflow-x:auto;width:100%;border:1px solid var(--border);border-radius:6px}
  .grid{display:grid;grid-template-columns:50px repeat(7,1fr);gap:1px;background:var(--border);min-width:700px}
  .cell{background:var(--surface);padding:5px 2px;text-align:center;font-size:.5rem;min-height:26px;display:flex;align-items:center;justify-content:center;transition:background .12s}
  .cell.header{background:var(--bg);color:var(--muted);font-weight:600;font-size:.55rem;letter-spacing:.03em;text-transform:uppercase;flex-direction:column;gap:1px;padding:6px 2px}
  .cell.header .date{font-weight:400;font-size:.45rem;opacity:.7}
  .cell.time-label{background:var(--bg);color:var(--muted);font-size:.45rem}
  .cell.available{background:rgba(255,255,255,.03)}
  .cell.available:hover{background:rgba(255,255,255,.08);cursor:default}
  .cell.busy{background:rgba(255,68,68,.15)}
  .cell.today{outline:1px solid rgba(255,255,255,.5);outline-offset:-1px}
  .timezone-note{margin-top:16px;font-size:.65rem;color:var(--muted);text-align:center}
  .updated{margin-top:6px;font-size:.6rem;color:var(--muted);text-align:center}
  @media(max-width:600px){body{padding:20px 10px}.cell{min-height:22px;font-size:.45rem}h1{font-size:1.2rem}}

</style>
</head>

</div>

let currentWeek = 0;
function renderWeek(idx) {
  document.getElementById('weeks-container').innerHTML = weekData[idx];
  document.querySelectorAll('.week-btn').forEach((btn, i) => btn.classList.toggle('active', i === idx));
  currentWeek = idx;
}
document.querySelectorAll('.week-btn').forEach(btn => btn.addEventListener('click', () => renderWeek(parseInt(btn.dataset.week))));
document.getElementById('prev').addEventListener('click', () => { if (currentWeek > 0) renderWeek(currentWeek - 1); });
document.getElementById('next').addEventListener('click', () => { if (currentWeek < weekData.length - 1) renderWeek(currentWeek + 1); });
